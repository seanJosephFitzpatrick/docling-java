name: Simple build and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

jobs:
  save-pr-info:
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'pull_request')
    needs: jvm-build-test
    steps:
      - name: Save PR number
        run: |
          mkdir -p ./pr
          echo ${{ github.event.pull_request.number }} > ./pr/number
          echo ${{ github.event.pull_request.head.sha }} > ./pr/sha

      - name: Upload PR metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-metadata
          path: pr/
          retention-days: 7

  jvm-build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - 17
          - 21
          - 25
          - 26
        module:
          - docling-serve-api
          - docling-serve-client
          - docling-testcontainers
          - docling-version-tests
    name: jvm-build-test-${{ matrix.module }}-java${{ matrix.java }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Reclaim disk space
        working-directory: .github
        shell: bash
        run: scripts/ci-reclaim-disk-space.sh

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: build-test-${{ matrix.module }}-java${{ matrix.java }}
        run: |
          ./gradlew --no-daemon -Pjava.version=${{ matrix.java }} \
            :${{ matrix.module }}:clean :${{ matrix.module }}:build

  prepare-test-reports:
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    strategy:
      fail-fast: false
      matrix:
        java:
          - 17
          - 21
          - 25
          - 26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Reclaim disk space
        working-directory: .github/scripts
        shell: bash
        run: ./ci-reclaim-disk-space.sh

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Create aggregated test report
        run: |
          ./gradlew --no-daemon -Pjava.version=${{ matrix.java }} :test-report-aggregation:check && \
            mkdir -p test-report-aggregation/build/reports/tests/junitXml && \
            find . -path '*/build/test-results/test/*.xml' -exec cp {} test-report-aggregation/build/reports/tests/junitXml \;

      - name: Upload coverage to Codecov
        if: github.repository == 'docling-project/docling-java' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          report_type: coverage
          files: ./test-report-aggregation/build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml
          flags: java${{ matrix.java }}
          name: codecov-java${{ matrix.java }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true

      - name: Upload test results to Codecov
        if: github.repository == 'docling-project/docling-java' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          report_type: test_results
          directory: ./test-report-aggregation/build/reports/tests/junitXml
          flags: java${{ matrix.java }}
          name: tests-java${{ matrix.java }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Prepare build reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-reports-java${{ matrix.java }}-${{ github.run_attempt }}
          path: |
            **/build/test-results/**/*.xml
            test-report-aggregation/build/reports/tests/test/aggregated-results/**
            test-report-aggregation/build/reports/jacoco/testCodeCoverageReport/**
          retention-days: 7

  docs:
    runs-on: ubuntu-latest
    name: build-docs-pr
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Reclaim disk space
        working-directory: .github/scripts
        shell: bash
        run: ./ci-reclaim-disk-space.sh

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Setup Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate documentation
        env:
          IS_PR_BUILD: true
        run: ./gradlew --console=plain clean :docs:build
